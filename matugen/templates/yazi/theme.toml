#:schema https://yazi-rs.github.io/schemas/theme.json
# Template de Matugen para yazi — se regenera solo con cada cambio de wallpaper
# Mapeo de roles Material You (mismo criterio que usan gtk.css y colors.lua):
#   primary   -> acento principal (equivalente a "accent_color" en GTK)
#   error     -> rojo/destructivo (cortar, borrar, escribir)
#   secondary/tertiary -> acentos secundarios
#   outline(_variant)  -> bordes y separadores
#   surface_container* -> fondos de paneles/chrome

[mgr]
cwd = { fg = "{{colors.primary.default.hex}}" }

# Búsqueda
find_keyword  = { fg = "{{colors.tertiary.default.hex}}", bold = true, italic = true, underline = true }
find_position = { fg = "{{colors.secondary.default.hex}}", bg = "reset", bold = true, italic = true }

# Marcadores: copiar=secondary, cortar=error, marcar=tertiary, seleccionar=primary
marker_copied   = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }
marker_cut      = { fg = "{{colors.error.default.hex}}", bg = "{{colors.error.default.hex}}" }
marker_marked   = { fg = "{{colors.tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}" }
marker_selected = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }

# Contadores (texto "on_X" para que se lea encima del color de fondo)
count_copied   = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }
count_cut      = { fg = "{{colors.on_error.default.hex}}", bg = "{{colors.error.default.hex}}" }
count_selected = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }

border_style = { fg = "{{colors.outline_variant.default.hex}}" }

[tabs]
active   = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
inactive = { fg = "{{colors.on_surface_variant.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }

[mode]
normal_main = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
normal_alt  = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }

select_main = { fg = "{{colors.on_tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}", bold = true }
select_alt  = { fg = "{{colors.tertiary.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }

unset_main = { fg = "{{colors.on_error.default.hex}}", bg = "{{colors.error.default.hex}}", bold = true }
unset_alt  = { fg = "{{colors.error.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }

[status]
overall = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_container_low.default.hex}}" }

perm_sep   = { fg = "{{colors.outline.default.hex}}" }
perm_type  = { fg = "{{colors.secondary.default.hex}}" }
perm_read  = { fg = "{{colors.tertiary.default.hex}}" }
perm_write = { fg = "{{colors.error.default.hex}}" }
perm_exec  = { fg = "{{colors.primary.default.hex}}" }

progress_normal = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
progress_error  = { fg = "{{colors.on_error.default.hex}}", bg = "{{colors.error.default.hex}}" }

[which]
mask            = { bg = "{{colors.scrim.default.hex}}" }
cand            = { fg = "{{colors.primary.default.hex}}" }
rest            = { fg = "{{colors.outline.default.hex}}" }
desc            = { fg = "{{colors.secondary.default.hex}}" }
separator_style = { fg = "{{colors.outline.default.hex}}" }

[confirm]
border  = { fg = "{{colors.outline.default.hex}}" }
title   = { fg = "{{colors.primary.default.hex}}" }
btn_yes = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }

[spot]
border   = { fg = "{{colors.outline.default.hex}}" }
title    = { fg = "{{colors.primary.default.hex}}" }
tbl_col  = { fg = "{{colors.secondary.default.hex}}" }
tbl_cell = { fg = "{{colors.on_tertiary_container.default.hex}}", bg = "{{colors.tertiary_container.default.hex}}" }

[notify]
title_info  = { fg = "{{colors.secondary.default.hex}}" }
title_warn  = { fg = "{{colors.tertiary.default.hex}}" }
title_error = { fg = "{{colors.error.default.hex}}" }

[pick]
border = { fg = "{{colors.outline.default.hex}}" }
active = { fg = "{{colors.primary.default.hex}}", bold = true }

[input]
border   = { fg = "{{colors.outline.default.hex}}" }
selected = { fg = "{{colors.on_primary_container.default.hex}}", bg = "{{colors.primary_container.default.hex}}" }

[cmp]
border = { fg = "{{colors.outline.default.hex}}" }
active = { fg = "{{colors.on_primary_container.default.hex}}", bg = "{{colors.primary_container.default.hex}}" }

[tasks]
border  = { fg = "{{colors.outline.default.hex}}" }
hovered = { fg = "{{colors.primary.default.hex}}", bold = true }

[help]
border  = { fg = "{{colors.outline.default.hex}}" }
chord   = { fg = "{{colors.primary.default.hex}}" }
hovered = { fg = "{{colors.on_primary_container.default.hex}}", bg = "{{colors.primary_container.default.hex}}", bold = true }
